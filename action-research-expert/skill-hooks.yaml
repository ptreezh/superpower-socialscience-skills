# Action Research Expert - Skill Hooks Configuration
# 三层持久化配置

version: "1.0"

hooks:
  # 第一层: 会话持久化
  session:
    - trigger: "on_task_start"
      action: "create_session_log"
      file: ".claude/session/action-research-{timestamp}.log"
      
    - trigger: "on_cycle_complete"
      action: "save_cycle_data"
      file: ".claude/session/ar-cycles/{cycle_id}.json"
      
    - trigger: "on_reflection"
      action: "save_reflection"
      file: ".claude/session/reflections/{date}.md"

  # 第二层: 项目持久化
  project:
    - trigger: "on_project_start"
      action: "init_project_structure"
      creates:
        - "action-research-workspace/"
        - "action-research-workspace/cycles/"
        - "action-research-workspace/data/"
        - "action-research-workspace/reflections/"
        
    - trigger: "on_analysis_complete"
      action: "save_analysis_report"
      file: "action-research-workspace/reports/{report_id}.md"
      
    - trigger: "on_cycle_end"
      action: "archive_cycle"
      file: "action-research-workspace/archives/cycle-{cycle_num}.zip"

  # 第三层: 学习持久化
  learning:
    - trigger: "on_pattern_discovered"
      action: "update_patterns"
      file: "experience/patterns.md"
      
    - trigger: "on_lesson_learned"
      action: "update_lesson_memory"
      file: "lesson-memory.md"
      
    - trigger: "on_case_completed"
      action: "archive_case"
      file: "cases/{case_type}/{case_id}.md"

# 自动任务队列
task_queue:
  auto_create: true
  persistence: true
  tasks:
    - id: "ar-diagnosis"
      name: "问题诊断"
      priority: 1
      dependencies: []
      
    - id: "ar-planning"
      name: "行动规划"
      priority: 2
      dependencies: ["ar-diagnosis"]
      
    - id: "ar-implementation"
      name: "行动实施"
      priority: 3
      dependencies: ["ar-planning"]
      
    - id: "ar-observation"
      name: "观察记录"
      priority: 4
      dependencies: ["ar-implementation"]
      
    - id: "ar-reflection"
      name: "反思评估"
      priority: 5
      dependencies: ["ar-observation"]
      
    - id: "ar-knowledge"
      name: "知识提取"
      priority: 6
      dependencies: ["ar-reflection"]

# 质量检查配置
quality_checks:
  - check: "spiral_cycle_completeness"
    threshold: 4  # 至少4个阶段
    on_fail: "warn"
    
  - check: "stakeholder_participation"
    threshold: 0.5  # 至少50%参与
    on_fail: "warn"
    
  - check: "reflection_depth"
    min_words: 200
    on_fail: "prompt_user"
    
  - check: "data_triangulation"
    min_sources: 3
    on_fail: "warn"
