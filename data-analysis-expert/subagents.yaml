# Data Analysis Subagent Definitions
# For parallel processing in AI CLI environments

subagents:
  # Data Quality Agent
  - name: da-quality-checker
    description: 数据质量Agent - 检查数据完整性、处理缺失值、识别异常值
    prompt_template: prompts/quality-checking-prompt.md
    tools:
      - analyze
      - data-quality-checker
      - prepare-data
    output_format: json
    quality_checks:
      - missing_values_handled
      - outliers_identified
      - data_types_correct
    required_output:
      - data_quality_report
      - missing_value_strategy
      - outlier_decisions

  # Descriptive Statistics Agent
  - name: da-descriptive-analyst
    description: 描述统计Agent - 计算集中趋势、离散程度、分布形态
    prompt_template: prompts/descriptive-analysis-prompt.md
    tools:
      - calculate-descriptive
      - generate-visualization
    output_format: json
    quality_checks:
      - central_tendency_reported
      - dispersion_measured
      - distribution_shape_described
    required_output:
      - mean_median_mode
      - std_iqr_range
      - skewness_kurtosis
      - distribution_plots

  # Regression Analysis Agent
  - name: da-regression-analyst
    description: 回归分析Agent - 线性回归、逻辑回归、多元回归
    prompt_template: prompts/regression-analysis-prompt.md
    tools:
      - run-regression
      - generate-visualization
    output_format: json
    quality_checks:
      - assumptions_verified
      - coefficients_reported
      - model_fit_assessed
    required_output:
      - regression_coefficients
      - r_squared_adj_r_squared
      - residuals_analysis
      - predictions

  # Inferential Statistics Agent
  - name: da-inferential-analyst
    description: 推断统计Agent - 假设检验、置信区间、效应量
    prompt_template: prompts/inferential-analysis-prompt.md
    tools:
      - run-inferential
      - analyze
    output_format: json
    quality_checks:
      - hypotheses_stated
      - assumptions_checked
      - effect_sizes_reported
    required_output:
      - test_statistic
      - p_value
      - confidence_interval
      - effect_size
      - conclusion

  # Visualization Agent
  - name: da-visualizer
    description: 可视化Agent - 统计图表、交互图形、报告生成
    prompt_template: prompts/visualization-prompt.md
    tools:
      - generate-visualization
    output_format: json
    quality_checks:
      - chart_type_appropriate
      - labels_clear
      - colors_accessible
    required_output:
      - plots
      - interactive_charts
      - figure_captions

  # Report Generation Agent
  - name: da-report-writer
    description: 报告生成Agent - 综合分析结果、撰写完整报告
    prompt_template: prompts/report-writing-prompt.md
    tools:
      - analyze
    output_format: markdown
    quality_checks:
      - results_interpreted
      - limitations_discussed
      - recommendations_provided
    required_output:
      - executive_summary
      - methodology_section
      - results_section
      - discussion_section
      - appendices

# Parallel Execution Configuration
execution:
  mode: parallel
  max_agents: 4
  coordination: sequential_merge
  task_decomposition:
    simple_tasks: single_agent
    complex_tasks: multiple_agents_parallel

# CRCT Chain Configuration (for Data Analysis)
crct_chain:
  constant_comparison:
    enabled: true
    description: "每个分析结果必须与假设和理论预期比较"
    required_fields:
      - comparison_with_hypotheses
      - comparison_with_literature
      - discrepancies_explained
  
  record:
    enabled: true
    description: "所有分析决策必须记录"
    required_fields:
      - method_selection_rationale
      - data_transformations
      - assumption_checks
  
  chain:
    enabled: true
    description: "建立变量之间的关系链条"
    required_fields:
      - input_variables
      - output_results
      - causal_interpretation
  
  trace:
    enabled: true
    description: "追踪分析结果演化过程"
    required_fields:
      - raw_data_summary
      - intermediate_calculations
      - final_results

# Task Queue Integration
task_queue:
  enabled: true
  auto_continue: true
  checkpoint_interval: 5
  persistence_file: task_plan.md

# Quality Assurance (Six Absolute Prohibitions)
quality_assurance:
  verification_levels: 4
  verification_steps:
    - data_quality_check
    - method_appropriateness_check
    - assumption_verification
    - result_validity_check

  strict_prohibitions:
    - no_ignored_data_quality
    - no_misused_statistical_methods
    - no_overextrapolated_conclusions
    - no_ignored_assumptions
    - no_misleading_visualizations
    - no_ignored_uncertainty

# Phase-Based Execution
phases:
  phase1_data_quality:
    description: "数据质量阶段 - 检查与清洗"
    agents: [da-quality-checker]
    mode: sequential
    output: data_quality_report.json
    quality_gate: data_quality_passed AND missing_values_handled
    
  phase2_descriptive:
    description: "描述统计阶段 - 基础分析"
    agents: [da-descriptive-analyst]
    mode: sequential
    depends_on: phase1_data_quality
    output: descriptive_statistics.json
    quality_gate: descriptive_complete
    
  phase3_inferential:
    description: "推断统计阶段 - 假设检验"
    agents: [da-inferential-analyst, da-regression-analyst]
    mode: parallel
    depends_on: phase2_descriptive
    output: inferential_results.json
    quality_gate: hypotheses_tested AND effect_sizes_reported
    
  phase4_visualization:
    description: "可视化阶段 - 图表生成"
    agents: [da-visualizer]
    mode: sequential
    depends_on: phase3_inferential
    output: visualizations.json
    quality_gate: charts_generated

  phase5_reporting:
    description: "报告阶段 - 结果整合"
    agents: [da-report-writer]
    mode: sequential
    depends_on: phase4_visualization
    output: analysis_report.md
    quality_gate: report_complete

# Mode Selection Logic
mode_selection:
  rules:
    - if: user_request_contains("数据质量") or user_request_contains("清洗")
      then: fast_mode
      execution: single_agent(da-quality-checker)
      estimated_time: "15-30 minutes"

    - if: user_request_contains("描述统计") or user_request_contains("基础分析")
      then: fast_mode
      execution: single_agent(da-descriptive-analyst)
      estimated_time: "20-30 minutes"

    - if: user_request_contains("回归") or user_request_contains("相关")
      then: fast_mode
      execution: single_agent(da-regression-analyst)
      estimated_time: "30-45 minutes"

    - if: user_request_contains("假设检验") or user_request_contains("推断")
      then: fast_mode
      execution: single_agent(da-inferential-analyst)
      estimated_time: "20-40 minutes"

    - if: user_request_contains("可视化") or user_request_contains("图表")
      then: fast_mode
      execution: single_agent(da-visualizer)
      estimated_time: "15-25 minutes"

    - if: user_request_contains_any(["完整分析", "全流程", "研究报告"])
      then: full_mode
      execution: sequential_phases([phase1, phase2, phase3, phase4, phase5])
      estimated_time: "2-4 hours"

    - if: ambiguous_request
      then: default_to_full_mode
      reason: "Quality priority - when uncertain, use comprehensive analysis"
      execution: full_mode

# Data Persistence
persistence:
  task_plan_file: task_plan.md
  session_log_file: session_log.md
  analysis_log_file: analysis_log.json
  data_snapshot_file: data_snapshot.csv
  quality_metrics_file: quality_metrics.json
  auto_save_interval: 5  # minutes

# Cross-Agent Collaboration
collaboration:
  # Can call these expert agents for specialized tasks
  can_call:
    - grounded-theory-expert  # 质性数据编码
    - social-network-analysis-expert  # 网络数据分析
    - qca-analysis-expert  # 组态分析
    - did-analysis-expert  # 因果推断

  # Standard interfaces for collaboration
  interfaces:
    qualitative_coding:
      input: interview_data, observation_data
      output: coded_themes, frequency_counts
    
    network_metrics:
      input: relational_data
      output: centrality_measures, community_structure
    
    configural_analysis:
      input: condition_variables, outcome_variable
      output: necessity_sufficiency, solution_terms
    
    causal_estimation:
      input: panel_data, treatment_indicator
      output: did_estimate, parallel_trend_test
