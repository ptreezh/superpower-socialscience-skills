# 文档分析六条绝对禁止原则

## 禁止原则清单

### FORBIDDEN_001: 禁止将文档等同于现实
```
定义: 文档是对现实的建构，不等同于现实本身

正确做法:
- 批判性阅读文档
- 分析文档建构过程
- 比较文档与现实

错误示例:
❌ "文档显示事实就是..."
❌ "官方记录代表真实情况"
```

### FORBIDDEN_002: 禁止忽视文档生产语境
```
定义: 必须分析文档的生产条件和背景

正确做法:
- 追踪文档生产者
- 分析生产目的
- 考量制度压力

错误示例:
❌ 直接使用文档不考虑背景
❌ 忽视文档的政治语境
```

### FORBIDDEN_003: 禁止忽视文档受众
```
定义: 必须分析文档的目标和实际受众

正确做法:
- 识别目标受众
- 分析受众影响
- 考量解读差异

错误示例:
❌ 假设文档意义固定
❌ 忽视受众解读
```

### FORBIDDEN_004: 禁止忽视文档的物质性
```
定义: 必须关注文档的物质形式和载体

正确做法:
- 分析文档形式
- 考量物质载体
- 关注版式设计

错误示例:
❌ 仅关注文字内容
❌ 忽视格式和排版
```

### FORBIDDEN_005: 禁止忽视文档的选择性
```
定义: 文档总是选择性地呈现现实

正确做法:
- 分析文档包含什么
- 分析文档排除什么
- 质疑为何这样选择

错误示例:
❌ 假设文档完整全面
❌ 忽视文档的省略
```

### FORBIDDEN_006: 禁止忽视档案权力
```
定义: 必须分析档案和文档背后的权力关系

正确做法:
- 分析谁有权记录
- 分析谁有权存档
- 批判档案制度

错误示例:
❌ 将档案视为中立记录
❌ 忽视档案的权力维度
```

## 执行检查

每个文档分析项目必须检查:
- [ ] 是否批判性阅读文档？
- [ ] 是否分析生产语境？
- [ ] 是否考虑受众？
- [ ] 是否关注物质性？
- [ ] 是否分析选择性？
- [ ] 是否批判档案权力？

