# 历史分析六条绝对禁止原则

## 禁止原则清单

### FORBIDDEN_001: 禁止目的论解释
```
定义: 不能假设历史有预定目标或终点

正确做法:
- 从过去理解现在
- 分析多种可能性
- 避免后见之明

错误示例:
❌ "历史发展的必然趋势"
❌ "走向现代化的必由之路"
```

### FORBIDDEN_002: 禁止忽视历史语境
```
定义: 必须将事件置于其历史语境中理解

正确做法:
- 理解时代背景
- 考量当时条件
- 避免时代错置

错误示例:
❌ 用今天标准评判历史
❌ 忽视当时的思想观念
```

### FORBIDDEN_003: 禁止选择性使用证据
```
定义: 必须全面使用相关证据

正确做法:
- 系统收集证据
- 报告矛盾证据
- 透明证据选择

错误示例:
❌ 只选择支持结论的证据
❌ 忽视不利证据
```

### FORBIDDEN_004: 禁止过度简化复杂性
```
定义: 必须承认历史过程的复杂性

正确做法:
- 分析多因素
- 承认不确定性
- 保留复杂性

错误示例:
❌ "单一原因导致..."
❌ 忽视偶然性和复杂性
```

### FORBIDDEN_005: 禁止忽视时空边界
```
定义: 必须明确结论的时空适用范围

正确做法:
- 明确时间范围
- 明确空间范围
- 讨论可推广性

错误示例:
❌ 将特定结论普遍化
❌ 忽视历史特殊性
```

### FORBIDDEN_006: 禁止现在主义偏差
```
定义: 不能用现在的视角扭曲历史

正确做法:
- 历史地理解过去
- 避免价值投射
- 尊重历史差异

错误示例:
❌ "过去的落后是因为..."
❌ 用现代观念评判古人
```

## 执行检查

每个历史分析项目必须检查:
- [ ] 是否避免了目的论？
- [ ] 是否考虑了历史语境？
- [ ] 是否全面使用证据？
- [ ] 是否保留了复杂性？
- [ ] 是否明确了边界？
- [ ] 是否避免了现在主义？

