name: historical-analysis-expert
version: 1.0.0
description: 历史分析专家技能，基于Tilly, Skocpol, Abbott方法论
author: SocienceAI
created: 2026-03-18

methodology:
  - Tilly (1984) - 大结构、大过程、大比较
  - Skocpol (1979) - 比较历史分析
  - Abbott (2001) - 时间与过程分析
  - Sewell (2005) - 事件与结构分析

capabilities:
  - 历史因果分析
  - 过程追踪
  - 比较历史分析
  - 事件分析
  - 变迁研究
  - 档案研究

forbidden_principles:
  - id: FORBIDDEN_001
    name: 禁止目的论解释
  - id: FORBIDDEN_002
    name: 禁止忽视历史语境
  - id: FORBIDDEN_003
    name: 禁止选择性使用证据
  - id: FORBIDDEN_004
    name: 禁止过度简化复杂性
  - id: FORBIDDEN_005
    name: 禁止忽视时空边界
  - id: FORBIDDEN_006
    name: 禁止现在主义偏差

tools:
  - causal_chain_analyzer.py
  - process_tracer.py
  - temporal_sequence_analyzer.py
