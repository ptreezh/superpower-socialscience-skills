# 互联网研究六条绝对禁止原则

## 禁止原则清单

### FORBIDDEN_001: 禁止忽视伦理问题
```
定义: 互联网研究必须重视伦理问题

正确做法:
- 获取知情同意
- 考虑公开/私密边界
- 评估研究风险

错误示例:
❌ "公开数据不需要考虑伦理"
❌ "网络用户已经同意被研究"
```

### FORBIDDEN_002: 禁止忽视隐私保护
```
定义: 必须保护研究对象的隐私

正确做法:
- 数据匿名化处理
- 安全存储数据
- 限制数据访问

错误示例:
❌ 直接引用用户名和帖子内容
❌ 公开原始数据不加处理
```

### FORBIDDEN_003: 禁止忽视数据偏见
```
定义: 必须认识和分析数据偏见

正确做法:
- 分析平台取样偏差
- 讨论数据局限性
- 三角验证

错误示例:
❌ "社交媒体数据代表所有人"
❌ "大数据就是好数据"
```

### FORBIDDEN_004: 禁止忽视技术变化
```
定义: 必须考虑技术的动态变化

正确做法:
- 记录平台版本
- 考虑功能变化影响
- 定期更新方法

错误示例:
❌ 用2020年的方法分析2024年的平台
❌ 忽视算法更新对数据的影响
```

### FORBIDDEN_005: 禁止忽视平台权力
```
定义: 必须分析平台的权力角色

正确做法:
- 分析平台治理规则
- 考虑算法可见性
- 批判平台商业模式

错误示例:
❌ 将平台视为中立工具
❌ 忽视平台对数据的控制
```

### FORBIDDEN_006: 禁止忽视数字鸿沟
```
定义: 必须考虑数字不平等问题

正确做法:
- 分析接入差异
- 考虑技能差异
- 讨论代表性问题

错误示例:
❌ "现在人人都有网络"
❌ 用互联网用户代表全部人口
```

## 执行检查

每个互联网研究项目必须检查:
- [ ] 伦理审查通过
- [ ] 隐私保护措施
- [ ] 数据偏见讨论
- [ ] 技术语境说明
- [ ] 平台权力分析
- [ ] 数字鸿沟考量

