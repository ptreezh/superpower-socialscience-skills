# Porter Five Forces Expert - Skill Configuration
name: porter-five-forces-expert
version: "5.0.0"
description: "波特五力模型专家"

forces:
  rivalry:
    name: "现有竞争者竞争"
    factors: ["竞争者数量", "行业增长", "差异化程度", "退出壁垒"]
  new_entrants:
    name: "潜在进入者威胁"
    factors: ["规模经济", "品牌忠诚", "资本需求", "政策限制"]
  substitutes:
    name: "替代品威胁"
    factors: ["相对价格", "转换成本", "性能比较"]
  supplier_power:
    name: "供应商议价能力"
    factors: ["供应商集中度", "替代投入", "转换成本"]
  buyer_power:
    name: "买方议价能力"
    factors: ["买方集中度", "采购量", "价格敏感度"]

scoring:
  intensity_scale: "1-5"
  weight_distribution:
    rivalry: 0.30
    new_entrants: 0.20
    substitutes: 0.15
    supplier_power: 0.15
    buyer_power: 0.20

attractiveness:
  high: "1.0-2.0"
  medium: "2.1-3.0"
  low: "3.1-5.0"
