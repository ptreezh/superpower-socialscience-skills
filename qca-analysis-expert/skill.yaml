---
name: qca-analysis-expert
version: 5.0.0-cli-native+agent
description: |
  定性比较分析专家技能（AI CLI 原生版）。支持自动任务队列执行和子Agent并行处理。
  基于 Ragin (1987, 2008) 的QCA方法论，支持csQCA、mvQCA、fsQCA三种分析方法。

  **质量优先，严谨分析**：严格遵循QCA方法论，确保校准有理论依据、案例导向分析、稳健性检验。

  基于 Ragin (1987, 2008), Schneider & Wagemann (2012) 的QCA方法论。

  核心能力：
  - 数据校准（Calibration）：将原始数据转化为集合隶属度
  - 真值表构建（Truth Table）：构建条件组合矩阵
  - 布尔最小化（Boolean Minimization）：简化逻辑表达式
  - 必要性/充分性分析：识别必要条件和充分条件组合
  - 稳健性检验：参数敏感性、校准敏感性分析

  严格遵循QCA方法论原则（6大绝对禁止原则）：
  - 禁止脱离理论校准
  - 禁止忽略案例独特性
  - 禁止过度简化
  - 禁止忽视时间维度
  - 禁止忽视稳健性
  - 禁止未验证就报告完成

author: SocienceAI Methodology Expert
license: MIT

metadata:
  version: "5.0.0-cli-native+agent"
  methodology: "QCA (Ragin 1987, 2008)"
  subagent-support: true
  graceful-fallback: true
  ai-cli-native: true
  task-queue-support: true
  absolute-prohibitions: true
  agentskills-io: true
  cross-platform: true

execution_modes:
  cli_queue: "CLI任务队列（基础）"
  subagent_parallel: "子Agent并行（增强）"

performance:
  sequential: "60分钟/案例"
  parallel: "65分钟/10案例（9.2x加速）"
  quality_guarantee: "校准理论依据完整、一致性≥0.80、覆盖度报告完整"

analysis_types:
  - calibration
  - truth-table
  - necessity-analysis
  - sufficiency-analysis
  - minimization
  - robustness-check
  - full-analysis

category: comparative-methods
tags:
  - qca
  - qualitative-comparative-analysis
  - set-theory
  - boolean-algebra
  - causal-complexity

inputs:
  data:
    type: object
    required: true
    description: 分析数据（案例数据集，包含条件和结果变量）
  analysis_type:
    type: string
    required: true
    description: 分析类型（calibration/truth-table/necessity-analysis/sufficiency-analysis/minimization/robustness-check/full-analysis）

outputs:
  results:
    type: object
    description: 分析结果
  report:
    type: string
    description: 完整分析报告

prompts:
  system: prompts/system-prompt.md

tools:
  - name: calibrate-data
    description: 数据校准（将原始数据转化为集合隶属度）
    module: data_calibrator
  - name: build-truth-table
    description: 真值表构建（构建条件组合矩阵）
    module: truth_table_builder
  - name: calculate-solution
    description: 解公式计算（布尔最小化）
    module: solution_calculator
  - name: analyze-consistency
    description: 一致性分析（必要性和充分性）
    module: consistency_analyzer
  - name: analyze-set-relations
    description: 集合关系分析
    module: set_relation_analyzer
  - name: analyze
    description: 主分析入口
    module: analyze

planning_files:
  task_plan:
    template: templates/task_plan.md.template
    file: task_plan.md

quality_checks:
  - name: calibration_theory
    description: 校准理论依据检查
    rule: "所有校准锚点必须有理论或实证依据"
  - name: consistency_threshold
    description: 一致性阈值检查
    rule: "充分一致性必须≥0.80"
  - name: case_orientation
    description: 案例导向检查
    rule: "每个关键组合必须回到案例"
  - name: robustness_check
    description: 稳健性检验检查
    rule: "必须至少进行参数敏感性检验"
  - name: solution_reporting
    description: 解报告检查
    rule: "至少报告复杂解和简化解两种"

dependencies:
  python: ">=3.8"
  packages:
    - numpy>=1.21.0
    - pandas>=1.3.0

compatibility:
  - agentskills.io
  - claude-desktop
  - qwen-cli
  - opencode

allowed-tools: Read Write Bash(python:*)