# 二手数据分析六条绝对禁止原则

## 禁止原则清单

### FORBIDDEN_001: 禁止忽视原始研究设计
```
定义: 必须理解并考虑原始研究的设计

正确做法:
- 审查原始研究目的
- 了解抽样设计
- 理解测量工具

错误示例:
❌ 直接使用数据不考虑来源
❌ 忽视原始研究限制
```

### FORBIDDEN_002: 禁止忽视数据收集局限
```
定义: 必须识别和说明数据收集的局限

正确做法:
- 分析数据收集方法
- 识别潜在偏差
- 说明数据限制

错误示例:
❌ 假设数据完美无缺
❌ 忽视数据收集问题
```

### FORBIDDEN_003: 禁止过度解释数据
```
定义: 结论不能超出数据支持的边界

正确做法:
- 明确因果限制
- 说明相关vs因果
- 谨慎推断

错误示例:
❌ "数据显示X导致Y"
❌ 相关当作因果
```

### FORBIDDEN_004: 禁止忽视测量等价性
```
定义: 比较分析必须确保测量等价

正确做法:
- 检验跨时等价
- 检验跨群体等价
- 说明不等价问题

错误示例:
❌ 直接比较不同测量
❌ 忽视问卷变化
```

### FORBIDDEN_005: 禁止忽视样本代表性
```
定义: 必须评估样本对总体的代表性

正确做法:
- 分析抽样方法
- 评估样本偏差
- 说明代表性限制

错误示例:
❌ 假设样本代表总体
❌ 忽视选择性偏差
```

### FORBIDDEN_006: 禁止忽视伦理问题
```
定义: 二手分析也需考虑伦理问题

正确做法:
- 检查使用许可
- 保护数据安全
- 正确引用来源

错误示例:
❌ 未获授权使用数据
❌ 不正确引用来源
```

## 执行检查

每个二手分析项目必须检查:
- [ ] 是否审查了原始研究设计？
- [ ] 是否说明了数据收集局限？
- [ ] 是否避免过度解释？
- [ ] 是否检验了测量等价性？
- [ ] 是否评估了样本代表性？
- [ ] 是否遵守了伦理规定？

