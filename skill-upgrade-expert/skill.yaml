---
name: skill-upgrade-expert
version: 5.0.0-cli-native+agent
description: |
  技能升级专家（AI CLI 原生版）。提供系统化的方法论，用于将AI CLI技能从任意版本升级到v5.0.0-cli-native标准。
  支持自动任务队列执行和子Agent并行处理，已验证14个研究方法技能升级成功。

  **四级升级路径，质量保证**：Level 1基础升级 → Level 2学术对齐 → Level 3 CLI原生集成 → Level 4自迭代学习

  成果统计：
  - 完成率: 100% (14/14技能)
  - 平均质量: 5/5 ⭐⭐⭐⭐⭐
  - 验证状态: 已在生产环境使用

  核心能力：
  - 四级升级路径：系统化的技能升级方法论
  - 6大禁止原则模板：质量保证基线
  - 任务分解规则：三层分解法
  - CLI原生集成：任务队列与状态持久化
  - 自迭代机制：经验学习与持续优化
  - 子Agent并行：批量升级加速（5-10x）

  严格遵循升级原则：
  - **禁止脱离数据/证据** - 所有结论必须有数据支撑
  - **禁止预设结论** - 避免先入为主的偏见
  - **禁止方法误用** - 严格按照方法论要求执行
  - **禁止忽视边界** - 明确方法论适用范围
  - **禁止质量妥协** - 不追求速度而牺牲质量
  - **禁止文档缺失** - 完整记录分析过程

author: SocienceAI Methodology Expert
license: MIT

metadata:
  version: "5.0.0-cli-native+agent"
  methodology: "The Skill of Upgrading Skills (提升技能的技能)"
  subagent-support: true
  graceful-fallback: true
  ai-cli-native: true
  task-queue-support: true
  absolute-prohibitions: true
  crct-enabled: true
  agentskills-io: true
  cross-platform: true

execution_modes:
  cli_queue: "CLI任务队列（基础）- 单技能升级，串行处理"
  subagent_parallel: "子Agent并行（增强）- 批量技能升级，5-10x加速"

performance:
  sequential: "3小时/单技能升级"
  parallel: "4小时/10技能并行（7.5x加速）"
  quality_guarantee: "完成率100%，平均质量5/5"

analysis_types:
  - single-upgrade
  - batch-upgrade
  - level-assessment
  - quality-validation
  - methodology-extraction

category: meta-skill
tags:
  - skill-upgrade
  - meta-skill
  - quality-assurance
  - methodology
  - cli-integration
  - continuous-improvement

inputs:
  skill_path:
    type: string
    required: true
    description: 待升级技能的路径
  target_level:
    type: integer
    required: false
    default: 4
    description: 目标升级级别（1-4）
  current_version:
    type: string
    required: false
    description: 当前版本号

outputs:
  upgrade_report:
    type: object
    description: 升级报告
  skill_files:
    type: array
    description: 创建或修改的文件列表
  quality_score:
    type: number
    description: 质量评分（1-5）

prompts:
  system: prompts/system-prompt.md

tools:
  - name: assess-skill-level
    description: 评估技能当前级别
    module: assess_skill_level
  - name: upgrade-level1
    description: Level 1基础升级
    module: upgrade_level1
  - name: upgrade-level2
    description: Level 2学术对齐
    module: upgrade_level2
  - name: upgrade-level3
    description: Level 3 CLI原生集成
    module: upgrade_level3
  - name: upgrade-level4
    description: Level 4自迭代学习
    module: upgrade_level4
  - name: validate-quality
    description: 质量验证
    module: validate_quality
  - name: generate-report
    description: 生成升级报告
    module: generate_report

planning_files:
  task_plan:
    template: templates/task_plan.md.template
    file: task_plan.md

quality_checks:
  - name: six_prohibitions
    description: 6大禁止原则检查
    rule: "所有禁止原则必须定制化并文档化"
  - name: directory_structure
    description: 目录结构检查
    rule: "必须符合标准目录结构"
  - name: academic_references
    description: 学术文献检查
    rule: "Level 2+必须有经典文献引用"
  - name: cli_integration
    description: CLI集成检查
    rule: "Level 3+必须有任务队列支持"
  - name: self_iteration
    description: 自迭代检查
    rule: "Level 4必须有经验学习机制"

dependencies:
  python: ">=3.8"
  packages:
    - pyyaml>=6.0
    - pathlib>=1.0

compatibility:
  - agentskills.io
  - claude-desktop
  - qwen-cli
  - opencode

allowed-tools: Read Write Bash(python:*)